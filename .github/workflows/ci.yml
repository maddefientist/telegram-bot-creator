name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt

      - name: Run linting
        run: |
          cd apps/api
          ruff check .

      - name: Run type checking
        run: |
          cd apps/api
          mypy --ignore-missing-imports .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret-only
          CSRF_SECRET: test-csrf-secret-only
          ENCRYPTION_KEY: test-encryption-key-only
          OPENROUTER_API_KEY: test-key
          SOLANA_RPC_URL: https://api.devnet.solana.com
          SOLANA_TREASURY_ADDRESS: 11111111111111111111111111111111
          RUNNER_SHARED_SECRET: test-runner-secret-only
        run: |
          cd apps/api
          pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/api/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run linting
        run: |
          cd apps/web
          npm run lint

      - name: Run type checking
        run: |
          cd apps/web
          npm run typecheck

      - name: Build
        run: |
          cd apps/web
          npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: botcreator-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: botcreator-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Runner image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/runner
          push: false
          tags: botcreator-runner:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
